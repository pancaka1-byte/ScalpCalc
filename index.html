<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>ScalpCalc</h1>
    <p class="subtitle">Kalkulator Range Harga</p>

    <div class="card">

        <label>Harga Dasar</label>
        <input type="number" id="harga" value="2910">

        <div class="btn-group">
            <button onclick="ubahHarga(-10)">-10</button>
            <button onclick="ubahHarga(-1)">-1</button>
            <button onclick="ubahHarga(1)">+1</button>
            <button onclick="ubahHarga(10)">+10</button>
        </div>

    </div>

    <div class="card">

        <label>Persentase</label>

        <input
            type="range"
            id="persen"
            min="0"
            max="10"
            step="0.1"
            value="2">

        <div class="nilai">
            <span id="persenValue">2.0 %</span>
        </div>

    </div>

    <div class="card hasil">

        <div class="row">
            <span>Harga Beli</span>
            <span id="beli">0</span>
        </div>

        <div class="row">
            <span>Harga Dasar</span>
            <span id="dasar">2910</span>
        </div>

        <div class="row">
            <span>Harga Jual</span>
            <span id="jual">0</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
