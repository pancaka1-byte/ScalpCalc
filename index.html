<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        <h2>SCALPCALC</h2>
        
        <div class="input-group">
            <label>Harga Dasar</label>
            <input type="number" id="hargaDasar" value="2910" placeholder="Contoh: 2910">
        </div>

        <div class="input-group">
            <label>Jumlah Koin</label>
            <input type="number" id="jumlahKoin" value="120" placeholder="Default: 1">
        </div>

        <hr>

        <div class="quick-buttons">
            <button onclick="adjustPoin(-10)">-10</button>
            <div class="vertical-stack">
                <button onclick="adjustPoin(-100)">-100</button>
                <button onclick="adjustPoin(-1)">-1</button>
                <button onclick="adjustPoin(100)">+100</button>
            </div>
            <button onclick="adjustPoin(1)">+1</button>
            <button onclick="adjustPoin(10)">+10</button>
        </div>

        <hr>

        <div class="slider-container">
            <input type="range" id="persenSlider" min="-300" max="300" step="0.1" value="0">
            <div class="slider-value"><span id="displayPoin">0</span> poin</div>
        </div>

        <hr>

        <div class="results">
            <div class="result-row"><span>Harga Dasar</span> <span id="resHargaDasar">2910</span></div>
            <div class="result-row"><span>Harga Hasil</span> <span id="resHargaHasil">2910</span></div>
            <div class="result-row"><span>Selisih</span> <span id="resSelisih">0</span></div>
            <div class="result-row"><strong>Profit</strong> <strong id="resProfit">0</strong></div>
        </div>

        <hr>

        <div class="action-buttons">
            <button id="btnReset" class="btn-secondary">RESET</button>
            <button id="btnSalin" class="btn-primary">SALIN</button>
        </div>
    </div>

    <script href="script.js" src="script.js"></script>
</body>
</html>
