<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScalpCalc</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>📈 ScalpCalc</h1>
    <p class="subtitle">Kalkulator Scalping Indodax</p>

    <div class="card">

        <label>Harga Dasar</label>

        <input
            type="number"
            id="harga"
            value="2910">

        <div class="btn-group">

            <button onclick="ubahHarga(-100)">-100</button>
            <button onclick="ubahHarga(-10)">-10</button>
            <button onclick="ubahHarga(-1)">-1</button>

            <button onclick="ubahHarga(1)">+1</button>
            <button onclick="ubahHarga(10)">+10</button>
            <button onclick="ubahHarga(100)">+100</button>

        </div>

    </div>


    <div class="card">

        <label>Jumlah Koin</label>

        <input
            type="number"
            id="qty"
            value="120">

    </div>


    <div class="card">

        <label>Perubahan Harga (Poin)</label>

        <div class="sliderInfo">

            <span>-1000</span>

            <span id="nilaiSlider">0</span>

            <span>+1000</span>

        </div>

        <input

            type="range"

            id="slider"

            min="-1000"

            max="1000"

            value="0"

            step="1">

    </div>


    <div class="card hasil">

        <div class="row">

            <span>Harga Dasar</span>

            <span id="hargaDasar">2910</span>

        </div>

        <div class="row">

            <span>Perubahan</span>

            <span id="selisih">0</span>

        </div>

        <div class="row">

            <span>Harga Hasil</span>

            <span id="hargaHasil">2910</span>

        </div>

        <div class="row">

            <span>Profit / Loss</span>

            <span id="profit">0</span>

        </div>

    </div>


    <div class="aksi">

        <button onclick="resetSemua()">

            RESET

        </button>

        <button onclick="sliderNol()">

            0

        </button>

        <button onclick="salinHasil()">

            SALIN

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
