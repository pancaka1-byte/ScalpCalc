<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>ScalpCalc</h1>
    <p class="subtitle">Kalkulator Range Harga</p>

    <div class="card">

        <label>Harga Dasar</label>
        <input type="number" id="harga" value="2910">

        <div class="btn-group">
            <button onclick="ubahHarga(-10)">-10</button>
            <button onclick="ubahHarga(-1)">-1</button>
            <button onclick="ubahHarga(1)">+1</button>
            <button onclick="ubahHarga(10)">+10</button>
        </div>

    </div>

    <div class="card">
       
<label>Perubahan Harga</label>

<div class="slider-label">
    <span>-300%</span>
    <span>0%</span>
    <span>+300%</span>
</div>

<input
    type="range"
    id="persen"
    min="-300"
    max="300"
    step="1"
    value="0">

<div class="nilai">
    <span id="persenValue">0 %</span>
</div>

    </div>

    <div class="card hasil">

    <div class="row">
        <span>Harga Awal</span>
        <span id="dasar">0</span>
    </div>

    <div class="row">
        <span>Selisih</span>
        <span id="selisih">0</span>
    </div>

    <div class="row">
        <span>Harga Hasil</span>
        <span id="hasil">0</span>
    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
