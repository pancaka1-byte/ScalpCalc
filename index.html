<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        <h2>SCALPCALC</h2>
        
        <div class="input-group">
            <label>Harga Dasar</label>
            <input type="number" id="hargaDasar" value="2910" placeholder="Contoh: 2910">
        </div>

        <div class="input-group">
            <label>Jumlah Koin</label>
            <input type="number" id="jumlahKoin" value="120" placeholder="Default: 1">
        </div>

        <hr>

        <div class="quick-buttons">
            <button type="button" onclick="adjustPoin(-10)">-10</button>
            <div class="vertical-stack">
                <button type="button" onclick="adjustPoin(-100)">-100</button>
                <button type="button" onclick="adjustPoin(-1)">-1</button>
                <button type="button" onclick="adjustPoin(100)">+100</button>
            </div>
            <button type="button" onclick="adjustPoin(1)">+1</button>
            <button type="button" onclick="adjustPoin(10)">+10</button>
        </div>

        <hr>

        <div class="slider-container">
            <input type="range" id="persenSlider" min="-300" max="300" step="0.1" value="0">
            <div class="slider-value"><span id="displayPoin">0</span> poin</div>
            <div id="displayPersen" class="slider-persen">0.00%</div>
        </div>

        <hr>

        <div class="results">
            <div class="result-row"><span>Harga Dasar</span> <span id="resHargaDasar">2.910</span></div>
            <div class="result-row"><span>Harga Hasil</span> <span id="resHargaHasil">2.910</span></div>
            <div class="result-row"><span>Selisih</span> <span id="resSelisih">0</span></div>
            <div class="result-row sub-detail"><span>Nilai Aset Awal</span> <span id="resAsetAwal">349.200</span></div>
            <div class="result-row sub-detail"><span>Nilai Aset Akhir</span> <span id="resAsetAkhir">349.200</span></div>
            <div class="result-row"><strong>Profit</strong> <strong id="resProfit">0</strong></div>
        </div>

        <hr>

        <div class="save-section">
            <input type="text" id="namaCatatan" placeholder="Nama Catatan (Misal: BTC Long)">
            <button type="button" id="btnSimpan" class="btn-success">SIMPAN DATA</button>
        </div>

        <div class="action-buttons">
            <button type="button" id="btnReset" class="btn-secondary">RESET</button>
            <button type="button" id="btnSalin" class="btn-primary">SALIN</button>
        </div>

        <div class="history-section">
            <h3>Riwayat Catatan</h3>
            <div id="listCatatan" class="list-catatan">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
